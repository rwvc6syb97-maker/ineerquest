# InnerQuest Ingress（占位）
# blocked：域名 / TLS 证书 / ingressClassName 需按环境补齐
# 路由策略：/api 前缀 -> api-svc:3000；其余 -> web-svc:80（SPA）
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: innerquest-ingress
  namespace: innerquest
  labels:
    app.kubernetes.io/part-of: innerquest
  annotations:
    # blocked：按实际 Ingress Controller 调整（nginx/traefik/云厂商）
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  # blocked：ingressClassName 需按集群补齐
  ingressClassName: nginx
  # blocked：TLS 证书 secret 需人工补齐
  # tls:
  #   - hosts:
  #       - innerquest.example.com
  #     secretName: innerquest-tls
  rules:
    # blocked：host 需按环境替换真实域名
    - host: innerquest.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-svc
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-svc
                port:
                  number: 80