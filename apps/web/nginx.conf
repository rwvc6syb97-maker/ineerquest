# InnerQuest 前端 nginx 配置
# - SPA history fallback：所有前端路由回退到 index.html
# - /api 反向代理占位：转发到后端 Service（K8s 中为 api-svc，compose 中为 api）
#   反代 upstream 主机名通过环境注入或按部署环境覆盖；此处为占位默认值

upstream innerquest_api {
    # 占位：本地 compose 用服务名 api:3000；K8s 用 api-svc:3000
    # blocked：生产 upstream 地址需按环境补齐/由 Ingress 统一接管
    server api:3000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip 压缩静态资源
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # 静态资源缓存
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # API 反向代理（占位）
    location /api/ {
        proxy_pass http://innerquest_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket（realtime 模块）支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # SPA history fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}