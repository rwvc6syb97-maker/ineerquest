# InnerQuest Ingress（Freenom + Cloudflare 配置）
# 域名：innerquest.tk（需在 Cloudflare 中添加 DNS A 记录指向负载均衡器）
# TLS：使用 Cloudflare Origin CA 证书，secretName: innerquest-tls
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: innerquest-ingress
  namespace: innerquest
  labels:
    app.kubernetes.io/part-of: innerquest
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/client-max-body-size: "50m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - innerquest.tk
        - api.innerquest.tk
      secretName: innerquest-tls
  rules:
    - host: api.innerquest.tk
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-svc
                port:
                  number: 3000
    - host: innerquest.tk
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-svc
                port:
                  number: 80