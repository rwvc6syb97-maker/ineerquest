# ============================================================================
# InnerQuest 生产 Secret — 部署前必须逐项填入真实凭证
# ============================================================================
# ⚠️ 安全警告：
#   1. 此文件严禁提交到 Git 仓库（已在 .gitignore 中）
#   2. 所有 CHANGE_ME 占位符必须替换为真实值
#   3. 生产环境建议使用外部密钥管理（Vault / 云 KMS / sealed-secrets）
#   4. JWT_SECRET 使用 `node -e "console.log(require('crypto').randomBytes(48).toString('base64'))"` 生成
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: innerquest-secret
  namespace: innerquest
  labels:
    app.kubernetes.io/name: innerquest
    app.kubernetes.io/part-of: innerquest
type: Opaque
stringData:

  # ===== 数据库 =====
  # MySQL 8.0 连接串（Prisma 格式）
  DATABASE_URL: "mysql://root:CHANGE_ME@mysql:3306/innerquest?connection_limit=10"

  # ===== JWT 鉴权 =====
  # 生成命令：node -e "console.log(require('crypto').randomBytes(48).toString('base64'))"
  JWT_SECRET: "7XPDeqceih5TOwTzr555STcEMZK/SkEpOSRXGBwAoktA9SGlxCBeJFj1OKGo/Uqu"

  # ===== AI / LLM（DeepSeek 兼容 OpenAI SDK） =====
  # 获取地址：https://platform.deepseek.com/api_keys
  LLM_API_KEY: "sk-ec0a2e2ff18f431e86fa10310f04f95c"

  # ===== 邮件服务（Resend） =====
  # 获取地址：https://resend.com/api-keys
  # 生产环境需先验证域名：在 Resend 控制台添加 DNS 记录
  RESEND_API_KEY: "re_PvPHU2ea_4dLGGmXGZ5ugrjWqb82N6fAR"

  # ===== 微信支付（可选，V1.1） =====
  WECHAT_PAY_MCHID: "CHANGE_ME"
  WECHAT_PAY_API_KEY: "CHANGE_ME"
  WECHAT_PAY_CERT_SERIAL: "CHANGE_ME"

  # ===== 短信服务（可选，V1.1） =====
  # 阿里云短信或腾讯云短信 AccessKey
  SMS_ACCESS_KEY_ID: "CHANGE_ME"
  SMS_ACCESS_KEY_SECRET: "CHANGE_ME"

  # ===== 阿里云 OSS（可选，V1.1） =====
  OSS_ACCESS_KEY_ID: "CHANGE_ME"
  OSS_ACCESS_KEY_SECRET: "CHANGE_ME"

  # ===== ClickHouse（可选，V1.1） =====
  CLICKHOUSE_PASSWORD: "CHANGE_ME"