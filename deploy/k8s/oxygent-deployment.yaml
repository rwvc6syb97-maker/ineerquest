# InnerQuest OxyGent 多智能体服务：Deployment + Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: innerquest-oxygent
  namespace: innerquest
  labels:
    app.kubernetes.io/name: innerquest-oxygent
    app.kubernetes.io/part-of: innerquest
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: innerquest-oxygent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: innerquest-oxygent
        app.kubernetes.io/part-of: innerquest
    spec:
      containers:
        - name: oxygent
          image: innerquest/oxygent:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
          envFrom:
            - configMapRef:
                name: innerquest-config
            - secretRef:
                name: innerquest-secret
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1024Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: oxygent-svc
  namespace: innerquest
  labels:
    app.kubernetes.io/name: innerquest-oxygent
    app.kubernetes.io/part-of: innerquest
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: innerquest-oxygent
  ports:
    - name: http
      port: 8001
      targetPort: http
