<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>InnerQuest · 向内求索</title>
    <script>
      // GitHub Pages SPA fallback (spa-github-pages 方案)
      // 将 /app/foo?x=1 这类深链接重写为 /?/app/foo&x=1，
      // 交由 index.html 的还原脚本转回 history 路由，避免刷新/直达时 404。
      (function () {
        var segmentCount = 0; // 自定义域名根路径部署，无需保留路径段
        var l = window.location;
        var path = l.pathname
          .split('/')
          .slice(0, 1 + segmentCount)
          .join('/');
        var rest = l.pathname
          .slice(1)
          .split('/')
          .slice(segmentCount)
          .join('/')
          .replace(/&/g, '~and~');
        var query = l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '';
        l.replace(l.origin + path + '/?/' + rest + query + l.hash);
      })();
    </script>
  </head>
  <body></body>
</html>
