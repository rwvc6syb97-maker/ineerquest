# InnerQuest CI 流水线（T0-11）
# 触发：push / PR 到主干与集成分支
# 阶段：安装依赖 -> Lint -> 构建(shared/api/web) -> tsc 类型检查 -> 单元测试
name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"
      - "chore/**"
  pull_request:
    branches:
      - main
      - develop

# 同分支并发运行时取消旧任务，节省 runner
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Lint / Build / Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20 (with npm cache)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # workspaces 统一安装（根 package-lock.json）
      - name: Install dependencies (npm ci)
        run: npm ci

      # Prisma Client 生成（后端 build/tsc 依赖）
      - name: Prisma generate (api)
        env:
          DATABASE_URL: "mysql://user:pass@localhost:3306/innerquest"
        run: npm --workspace apps/api run prisma:generate

      # 后端 schema 静态校验
      # validate 仅做静态校验，不真正连库；提供占位 DATABASE_URL 以满足 env() 解析
      - name: Prisma validate (api)
        env:
          DATABASE_URL: "mysql://user:pass@localhost:3306/innerquest"
        run: npm --workspace apps/api run prisma:validate

      # Lint：根脚本聚合各 workspace 的 lint（--if-present）
      - name: Lint (all workspaces)
        run: npm run lint

      # 构建：shared 无需编译（源码直引），先构建 api，再构建 web
      - name: Build api (nest build)
        run: npm run build:api

      - name: Build web (tsc -b && vite build)
        run: npm run build:web

      # 单元测试：有 test 脚本才跑（当前脚手架未定义 test，占位跳过说明）
      - name: Unit tests (api, if present)
        run: npm --workspace apps/api run test --if-present
        continue-on-error: true

      - name: Unit tests (web, if present)
        run: npm --workspace apps/web run test --if-present
        continue-on-error: true

      - name: CI summary
        run: |
          echo "CI 完成：lint / build(api+web) / tsc 已执行。"
          echo "注：单元测试脚本尚未在脚手架定义，已用 --if-present 占位跳过（continue-on-error）。"