# InnerQuest CD 流水线（T0-11）
# 职责：构建并推送 Docker 镜像(api+web) -> 按环境 kubectl apply -k deploy/k8s
# 环境映射（分支/tag -> environment）：
#   develop        -> test
#   release/**      -> staging
#   main / v* tag   -> prod
#   手动触发(workflow_dispatch) -> 可选 dev/test/staging/prod
# 所有敏感项均用 GitHub Secrets 占位，标注 [blocked：需人工补齐]
name: CD

on:
  push:
    branches:
      - develop
      - "release/**"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: "目标部署环境"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - test
          - staging
          - prod

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------- 阶段1：解析目标环境 ----------
  resolve-env:
    name: Resolve target environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.map.outputs.environment }}
    steps:
      - name: Map ref -> environment
        id: map
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            ENV="test"
          elif [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            ENV="staging"
          elif [ "${{ github.ref }}" = "refs/heads/main" ] || [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ENV="prod"
          else
            ENV="dev"
          fi
          echo "environment=$ENV" >> "$GITHUB_OUTPUT"
          echo "目标环境解析为：$ENV"

  # ---------- 阶段2：构建并推送镜像 ----------
  build-push:
    name: Build& Push images
    runs-on: ubuntu-latest
    needs: resolve-env
    timeout-minutes: 30
    env:
      # [blocked：需人工补齐] 镜像仓库地址，如 registry.example.com/innerquest
      REGISTRY: ${{ secrets.REGISTRY }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # [blocked：需人工补齐] REGISTRY_USERNAME / REGISTRY_PASSWORD
      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
          if: ${{ secrets.REGISTRY != '' }}

      # 构建上下文为 monorepo 根目录（Dockerfile 内直引 packages/shared）
      - name: Build & push api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/api:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/web:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------- 阶段3：部署到目标环境 ----------
  deploy:
    name: Deploy to ${{ needs.resolve-env.outputs.environment }}
    runs-on: ubuntu-latest
    needs:
      - resolve-env
      - build-push
    # GitHub Environments：可在此配置 required reviewers / 环境级 secrets
    environment: ${{ needs.resolve-env.outputs.environment }}
    timeout-minutes: 20
    env:
      REGISTRY: ${{ secrets.REGISTRY }}
      IMAGE_TAG: ${{ github.sha }}
      TARGET_ENV: ${{ needs.resolve-env.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.29.0"

      # [blocked：需人工补齐] KUBECONFIG（建议按环境配置为环境级 secret）
      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      # 用 kustomize 覆写镜像 tag（避免改动 k8s 基线 yaml）
      - name: Set image tags via kustomize
        working-directory: deploy/k8s
        run: |
          kubectl kustomize . > /dev/null
          kustomize edit set image innerquest/api="${REGISTRY}/api:${IMAGE_TAG}" || \
            (cd . && kubectl kustomize .)
          echo "镜像 tag 覆写完成（如无 kustomize CLI，可在集群侧 set image）。"

      # 环境相关配置/密钥经 Secret 注入（configmap/secret 由 kustomize 管理）
      # [blocked：需人工补齐] DB_URL / REDIS_URL / JWT_SECRET / OSS_* / LLM_API_KEY / WECHAT_PAY_*
      - name: Apply manifests (kubectl apply -k)
        run: |
          echo "部署到环境：$TARGET_ENV"
          kubectl apply -k deploy/k8s

      - name: Rollout status
        run: |
          kubectl -n innerquest rollout status deployment/innerquest-api --timeout=180s
          kubectl -n innerquest rollout status deployment/innerquest-web --timeout=180s

      - name: Deploy summary
        run: |
          echo "已向 [$TARGET_ENV] 环境应用 deploy/k8s（kustomize）。"
          echo "注：runner/凭证/集群为 blocked 占位，实际部署需补齐 Secrets 后由真实环境执行。"